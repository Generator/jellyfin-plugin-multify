<div data-role="page" id="multifyConfigurationPage" class="page type-interior pluginConfigurationPage fullWidthContent"
     data-controller="__plugin/Multify.js">
    <div class="content-primary">
        <div class="verticalSection">
            <div class="sectionTitleContainer">
                <h2 class="sectionTitle">Multify</h2>
                <a is="emby-linkbutton" class="raised raised-mini" style="margin-left: 2em;" target="_blank"
                   href="https://github.com/Generator/jellyfin-plugin-multify">
                    <span>Help</span>
                </a>
            </div>
        </div>

        <a href="#multifyTabContent" class="multify-skip-link">Skip to content</a>

        <div class="multifyTabLayout" style="display:grid;grid-template-columns:180px 1fr;gap:24px;min-height:60vh;">
            <nav class="multifyTabNav" id="multifyTabNav" aria-label="Settings Sections" style="display:flex;flex-direction:column;gap:4px;padding-top:8px;"></nav>
            <main class="multifyTabContent" id="multifyTabContent" tabindex="-1" style="padding:8px 0;"></main>
        </div>

        <div id="tabWarningBanner" class="multify-tab-warning" role="status" style="display:none;">
            <span style="flex-shrink:0;">&#x26A0;</span>
            <span>You have unsaved changes. Remember to save before leaving.</span>
        </div>

        <div class="multify-save-footer" aria-label="Save controls">
            <span id="dirtyIndicator" class="multify-dirty-indicator" aria-live="polite" style="display:none;">&#x25cf; Unsaved changes</span>
            <span id="saveStatus" class="multify-save-status" aria-live="polite" aria-atomic="true" style="display:none;"></span>
            <button id="saveConfig" is="emby-button" type="button" class="raised button-submit" aria-label="Save configuration">
                <span>Save</span>
            </button>
        </div>
    </div>

    <template id="template-notification-type">
        <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" data-name="notificationTypeValue"/>
            <span data-name="notificationTypeName"></span>
        </label>
    </template>

    <template id="template-user-filter">
        <label class="checkboxContainer">
            <input is="emby-checkbox" type="checkbox" data-name="userFilterValue"/>
            <span data-name="userFilterName"></span>
        </label>
    </template>

    <template id="template-base">
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtWebhookName" label="Webhook Name:"/>
            <span>The webhook name (for display only)</span>
        </div>
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtWebhookUri" label="Webhook Url:"/>
            <span>The webhook destination url</span>
        </div>
        <div class="inputContainer">
            <label>Status:</label>
            <label class="checkboxContainer">
                <input is="emby-checkbox" type="checkbox" data-name="chkEnableWebhook"/>
                <span>Enable</span>
            </label>
        </div>
        <div>
            <label>Notification Type:</label>
            <div data-name="notificationTypeContainer"></div>
        </div>
        <div>
            <label>User Filter:</label>
            <div data-name="userFilterContainer"></div>
        </div>
        <div>
            <label>Item Type:</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;">
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableMovies"/>
                    <span>Movies</span>
                </label>
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableEpisodes"/>
                    <span>Episodes</span>
                </label>
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableSeasons"/>
                    <span>Season</span>
                </label>
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableSeries"/>
                    <span>Series</span>
                </label>
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableAlbums"/>
                    <span>Albums</span>
                </label>
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableSongs"/>
                    <span>Songs</span>
                </label>
                <label class="checkboxContainer">
                    <input is="emby-checkbox" type="checkbox" data-name="chkEnableVideos"/>
                    <span>Videos</span>
                </label>
            </div>
        </div>
        <div style="margin-top:8px;">
            <label class="checkboxContainer">
                <input is="emby-checkbox" type="checkbox" data-name="chkSendAllProperties"/>
                <span>Send All Properties (ignores template)</span>
            </label>
            <label class="checkboxContainer">
                <input is="emby-checkbox" type="checkbox" data-name="chkTrimWhitespace"/>
                <span>Trim leading and trailing whitespace from message body before sending</span>
            </label>
            <label class="checkboxContainer">
                <input is="emby-checkbox" type="checkbox" data-name="chkSkipEmptyMessageBody"/>
                <span>Do not send when message body is empty</span>
            </label>
        </div>
        <div class="inputContainer" style="margin-top:12px;">
            <label>Template:</label>
            <div>
                <textarea data-name="txtTemplate" style="width: 100%; height: 400px"></textarea>
            </div>
        </div>
    </template>

    <template id="template-telegram">
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtBotToken" label="Bot Token:"/>
        </div>
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtChatId" label="Chat ID:"/>
        </div>
        <div class="selectContainer">
            <select is="emby-select" data-name="ddlParseMode" label="Parse Mode:">
                <option value="HTML">HTML</option>
                <option value="Markdown">Markdown</option>
                <option value="MarkdownV2">MarkdownV2</option>
            </select>
        </div>
        <div class="selectContainer">
            <select is="emby-select" data-name="ddlMessageType" label="Message Type:">
                <option value="0">Text (sendMessage)</option>
                <option value="1">Photo (sendPhoto)</option>
                <option value="2">Rich Message (sendRichMessage)</option>
            </select>
        </div>
    </template>

    <template id="template-gotify">
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtToken" label="Token:"/>
        </div>
        <div class="inputContainer">
            <input is="emby-input" type="number" data-name="txtPriority" label="Priority:"/>
        </div>
    </template>

    <template id="template-ntfy">
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtTopic" label="Topic:"/>
        </div>
        <div class="selectContainer">
            <select is="emby-select" data-name="ddlPriority" label="Priority:">
                <option value="1">Min</option>
                <option value="2">Low</option>
                <option value="3" selected>Default</option>
                <option value="4">High</option>
                <option value="5">Max/Urgent</option>
            </select>
        </div>
        <div class="inputContainer">
            <label class="checkboxContainer">
                <input is="emby-checkbox" type="checkbox" data-name="chkEnableMarkdown"/>
                <span>Enable Markdown</span>
            </label>
        </div>
        <div class="inputContainer">
            <input is="emby-input" type="text" data-name="txtAccessToken" label="Access Token (optional):"/>
        </div>
    </template>

    <template id="template-generic-header">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
            <input is="emby-input" type="text" data-name="txtHeaderKey" label="Header Name:" style="flex:1;"/>
            <input is="emby-input" type="text" data-name="txtHeaderValue" label="Header Value:" style="flex:1;"/>
            <button is="emby-button" type="button" class="raised button-warning btnRemoveHeader" style="flex-shrink:0;">
                <span>X</span>
            </button>
        </div>
    </template>

    <template id="template-generic-field">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
            <input is="emby-input" type="text" data-name="txtFieldKey" label="Field Name:" style="flex:1;"/>
            <input is="emby-input" type="text" data-name="txtFieldValue" label="Field Value:" style="flex:1;"/>
            <button is="emby-button" type="button" class="raised button-warning btnRemoveField" style="flex-shrink:0;">
                <span>X</span>
            </button>
        </div>
    </template>

    <template id="template-generic">
        <div class="inputContainer">
            <label>Custom Headers:</label>
            <div data-name="headersContainer"></div>
            <button is="emby-button" type="button" class="raised btnAddHeader">
                <span>Add Header</span>
            </button>
        </div>
        <div class="inputContainer">
            <label>Custom Fields (merged into notification data):</label>
            <div data-name="fieldsContainer"></div>
            <button is="emby-button" type="button" class="raised btnAddField">
                <span>Add Field</span>
            </button>
        </div>
    </template>

    <style>
        :root {
            color-scheme: dark;

            /* Color tokens with Jellyfin theme fallbacks */
            --multify-bg: var(--theme-background, #1a1a2e);
            --multify-surface: var(--theme-card-background, #16213e);
            --multify-text: var(--theme-text-color, #e0e0e0);
            --multify-text-muted: var(--theme-text-color-secondary, #999);
            --multify-border: rgba(255, 255, 255, 0.1);
            --multify-accent: var(--theme-primary-color, #00a4dc);
            
            /* Status colors */
            --multify-error: #f44336;
            --multify-warning: #ffa500;
            --multify-success: #4caf50;
            
            /* Contrast text for use on accent / colored backgrounds */
            --multify-on-accent: #fff;
            
            /* Hover states */
            --multify-hover: rgba(255, 255, 255, 0.05);
            --multify-hover-strong: rgba(255, 255, 255, 0.08);
            
            /* Border variants */
            --multify-border-strong: rgba(255, 255, 255, 0.2);
            --multify-border-muted: rgba(155, 155, 155, 0.5);
            
            /* Form control tokens */
            --multify-input-bg: rgba(255, 255, 255, 0.05);
            --multify-input-border: rgba(255, 255, 255, 0.15);
            --multify-input-focus: var(--theme-primary-color, #00a4dc);
        }

        /* Skip link for accessibility */
        .multify-skip-link {
            position: absolute;
            top: 8px;
            left: 16px;
            z-index: 20;
            padding: 8px 12px;
            border-radius: 4px;
            background: var(--multify-accent);
            color: var(--multify-on-accent);
            text-decoration: none;
            transform: translateY(-160%);
        }

        .multify-skip-link:focus-visible {
            transform: translateY(0);
            outline: 2px solid var(--multify-on-accent);
            outline-offset: 2px;
        }

        .checkboxContainer {
            max-width: fit-content;
        }
        
        .multify-tab-button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--multify-text);
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.95em;
            font-family: inherit;
            touch-action: manipulation;
            transition: background 0.15s, color 0.15s;
        }
        
        .multify-tab-button:hover {
            background: var(--multify-hover);
        }
        
        .multify-tab-button:focus-visible {
            outline: 2px solid var(--multify-accent);
            outline-offset: 2px;
        }
        
        .multify-tab-button.tab-active {
            background: color-mix(in srgb, var(--multify-accent) 15%, transparent);
            color: var(--multify-accent);
            font-weight: 600;
        }
        
        .multify-destination-card {
            border: 1px solid var(--multify-border);
            border-radius: 8px;
            margin-bottom: 12px;
            background: var(--multify-surface);
            overflow: hidden;
        }
        
        .multify-destination-card .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
        }
        
        .multify-destination-card .card-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .multify-collapse-toggle {
            background: none;
            border: none;
            color: var(--multify-text);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }
        
        .multify-collapse-toggle:hover {
            opacity: 1;
        }
        
        .multify-collapse-icon {
            font-size: 12px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .multify-destination-card.collapsed .multify-collapse-icon {
            transform: rotate(-90deg);
        }
        
        .multify-destination-title {
            font-size: 1em;
            font-weight: 600;
            color: var(--multify-text);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .multify-destination-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        
        .multify-destination-content {
            padding: 0 16px 16px;
            border-top: 1px solid var(--multify-border-muted);
        }
        
        .multify-destination-card.collapsed .multify-destination-content {
            display: none;
        }
        
        .multify-edit-icon, .multify-trash-icon {
            background: none;
            border: none;
            color: var(--multify-text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        
        .multify-edit-icon:hover, .multify-trash-icon:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--multify-text);
        }
        
        .multify-edit-icon:focus-visible, .multify-trash-icon:focus-visible {
            outline: 2px solid var(--multify-accent);
            outline-offset: 1px;
        }
        
        /* Form field helpers */
        .multify-field-description {
            font-size: 0.85em;
            color: var(--multify-text-muted);
            margin-top: 4px;
        }
        
        .multify-field-warning {
            font-size: 0.85em;
            color: var(--multify-warning);
            margin-top: 4px;
        }
        
        .multify-field-error {
            font-size: 0.85em;
            color: var(--multify-error);
            margin-top: 4px;
            display: none;
        }
        
        .multify-field-error-active {
            border-color: var(--multify-error);
        }
        
        /* Side-by-side layout */
        .multify-side-by-side {
            display: flex;
            gap: 24px;
        }
        
        .multify-side-by-side > * {
            flex: 1;
        }
        
        /* Focus states for form controls */
        input[type="number"]:focus-visible,
        input[type="text"]:focus-visible,
        select:focus-visible {
            border-color: var(--multify-input-focus);
            outline: 2px solid var(--multify-accent);
            outline-offset: 2px;
        }
        
        /* Action buttons */
        .multify-action-button {
            background: var(--multify-accent);
            color: var(--multify-on-accent);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
            touch-action: manipulation;
        }

        .multify-action-button:hover {
            opacity: 0.9;
        }

        .multify-action-button:focus-visible {
            outline: 2px solid var(--multify-accent);
            outline-offset: 2px;
        }

        .multify-action-button:disabled {
            opacity: 0.6;
        }

        /* Tab warning banner */
        .multify-tab-warning {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            background: rgba(232, 168, 54, 0.08);
            border: 1px solid rgba(232, 168, 54, 0.25);
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--multify-warning);
            line-height: 1.4;
        }

        /* Confirm dialog modal */
        .multify-confirm-dialog {
            background: var(--multify-surface);
            color: var(--multify-text);
            border: 1px solid var(--multify-border);
            border-radius: 8px;
            padding: 24px;
            max-width: 420px;
            width: calc(100% - 32px);
            box-sizing: border-box;
        }

        .multify-confirm-dialog::backdrop {
            background: rgba(0, 0, 0, 0.6);
        }

        .multify-confirm-title {
            margin: 0 0 8px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .multify-confirm-body {
            margin: 0 0 16px;
            font-size: 0.9em;
            color: var(--multify-text-muted);
            line-height: 1.5;
        }

        .multify-confirm-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .multify-confirm-btn {
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: pointer;
            border: none;
            font-family: inherit;
            touch-action: manipulation;
        }

        .multify-confirm-btn:focus-visible {
            outline: 2px solid var(--multify-accent);
            outline-offset: 2px;
        }

        .multify-confirm-btn.cancel {
            background: var(--multify-input-bg);
            border: 1px solid var(--multify-input-border);
            color: var(--multify-text);
        }

        .multify-confirm-btn.cancel:hover {
            background: var(--multify-hover-strong);
        }

        .multify-confirm-btn.confirm {
            background: rgba(244, 67, 54, 0.2);
            color: var(--multify-error);
        }

        .multify-confirm-btn.confirm:hover {
            background: rgba(244, 67, 54, 0.3);
        }

        /* Dirty indicator */
        .multify-dirty-indicator {
            margin-right: auto;
            font-size: 0.85em;
            color: var(--multify-warning);
            white-space: nowrap;
        }

        /* Disabled block — used for reactive visibility */
        .multify-disabled-block {
            opacity: 0.6;
            pointer-events: none;
        }
        
        /* Save footer */
        .multify-save-footer {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-top: 1px solid var(--multify-border);
            background: rgba(28, 28, 30, 0.92);
            z-index: 10;
        }
        
        .multify-save-status {
            margin-right: auto;
            font-size: 0.85em;
            color: var(--multify-text-muted);
        }
        
        .multify-save-status[data-state="success"] {
            color: var(--multify-success);
        }
        
        .multify-save-status[data-state="error"] {
            color: var(--multify-error);
        }

        /* Save button polish (intro-skipper patterns) */
        #saveConfig {
            touch-action: manipulation;
        }

        #saveConfig:disabled {
            opacity: 0.7;
            cursor: progress;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .multify-tab-button {
                transition: none;
            }
        }
        
        @media (max-width: 768px) {
            .multifyTabLayout {
                grid-template-columns: 1fr !important;
            }
            .multifyTabNav {
                flex-direction: row !important;
                align-items: flex-start;
                overflow-x: auto;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                padding-bottom: 4px;
            }
            .multifyTabNav::-webkit-scrollbar {
                display: none;
            }
            .multify-tab-button {
                width: auto;
                min-width: fit-content;
                min-height: 44px;
                padding: 10px 14px;
                flex-shrink: 0;
                font-size: 0.9em;
            }
            .multify-tab-button.tab-active {
                background: var(--multify-accent);
                color: var(--multify-on-accent);
                border-radius: 20px;
            }
            .multify-side-by-side {
                flex-direction: column;
                gap: 0;
            }
            .multify-destination-card {
                padding: 12px;
            }
            .multify-destination-card .card-header {
                flex-wrap: wrap;
                gap: 8px;
            }
        }
    </style>
</div>
